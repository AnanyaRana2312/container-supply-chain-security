apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-app
  template:
    metadata:
      labels:
        app: security-app
    spec:
      containers:
      - name: security-app
        image: ghcr.io/ananyarana2312/container-supply-chain-security@sha256:085e113df0b7f061e65fa258acead87412f0e8d259c25f459d03497c575eef8c
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: security-app-service
spec:
  selector:
    app: security-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
