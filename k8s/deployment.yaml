apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-app
  template:
    metadata:
      labels:
        app: security-app
    spec:
      containers:
      - name: security-app
        image: my-docker-repo/security-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: security-app-service
spec:
  selector:
    app: security-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
