name: CI/CD Pipeline - Supply Chain Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ananyarana2312/container-supply-chain-security

jobs:
  build-sign-verify:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Push Docker image
      run: |
        docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.IMAGE_NAME }}:latest

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign image with Cosign
      run: |
        cosign sign --yes ${{ env.IMAGE_NAME }}:${{ github.sha }}
      env:
        COSIGN_EXPERIMENTAL: 1

    - name: Verify image signature
      run: |
        cosign verify \
          --certificate-identity-regexp="https://github.com/AnanyaRana2312/*" \
          --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
